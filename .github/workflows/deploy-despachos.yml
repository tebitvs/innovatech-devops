name: Deploy Despachos API Innovatech

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "back-Despachos_SpringBoot/**"
      - ".github/workflows/deploy-despachos.yml"

permissions:
  contents: read

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build despachos image
        run: |
          docker build \
            -t ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_DESPACHOS }}:${IMAGE_TAG} \
            -t ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_DESPACHOS }}:latest \
            ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push despachos image to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_DESPACHOS }}:${IMAGE_TAG}
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_DESPACHOS }}:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy despachos API to EKS
        run: |
          kubectl set image deployment/despachos-api \
            despachos-api=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_DESPACHOS }}:${IMAGE_TAG} \
            -n ${{ secrets.K8S_NAMESPACE }}

          kubectl rollout status deployment/despachos-api \
            -n ${{ secrets.K8S_NAMESPACE }}